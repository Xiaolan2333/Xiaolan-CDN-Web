<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xiaolan's CDN控制台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<div id="app" v-cloak>
    <div v-if="!isLoggedIn" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-600">Xiaolan's CDN控制台</h1>
                <p class="text-slate-500 mt-2">请输入登录</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">用户名</label>
                    <input v-model="loginForm.username" type="text" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-100" placeholder="Admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
                    <input v-model="loginForm.password" @keyup.enter="handleLogin" type="password" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-100" placeholder="••••••••">
                </div>
                <button @click="handleLogin" :disabled="loggingIn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-indigo-100 disabled:opacity-50">
                    {{ loggingIn ? '验证中...' : '立即登录' }}
                </button>
            </div>
        </div>
    </div>

    <div v-else class="max-w-7xl mx-auto p-3 sm:p-6">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 sm:mb-6 bg-white p-4 sm:p-6 rounded-xl shadow-sm gap-4">
            <div class="flex justify-between items-center w-full md:w-auto">
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold text-indigo-600">Xiaolan's CDN控制台</h1>
                    <p class="text-xs sm:text-sm text-slate-500 mt-1">管理世界上最抽象的CDN系统（bushi）版本：Xiaolan-CDN-Web-V0.0.2</p>
                </div>
                <button @click="handleLogout" class="md:hidden text-xs text-rose-500 bg-rose-50 px-3 py-1.5 rounded-lg">退出</button>
            </div>
            <div class="flex flex-row gap-2 w-full md:w-auto">
                <button @click="triggerCmd('/sync')" class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap shadow-sm">同步节点</button>
                <button @click="triggerCmd('/update')" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap shadow-sm">一键更新</button>
                <button @click="handleLogout" class="hidden md:block bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2.5 rounded-lg text-sm font-medium transition shadow-sm">退出登录</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 md:gap-6">
            <nav class="col-span-1 bg-white p-2 sm:p-4 rounded-xl shadow-sm h-fit flex flex-row md:flex-col gap-1 sm:gap-2 overflow-x-auto hide-scrollbar md:custom-scrollbar">
                <button @click="currentTab = 'nginx'" :class="tabClass(currentTab === 'nginx')">站点配置</button>
                <button @click="currentTab = 'ssl'" :class="tabClass(currentTab === 'ssl')">证书管理</button>
                <button @click="currentTab = 'logs'" :class="tabClass(currentTab === 'logs')">访问日志</button>
                <button @click="currentTab = 'nodes'" :class="tabClass(currentTab === 'nodes')">节点管理</button>
                <button @click="currentTab = 'console'" :class="tabClass(currentTab === 'console')">终端输出</button>
            </nav>

            <main class="col-span-1 md:col-span-4 bg-white p-4 sm:p-6 rounded-xl shadow-sm min-h-[500px] sm:min-h-[600px]">
                <div v-if="currentTab === 'nginx'" class="space-y-4">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-2 gap-3">
                        <h2 class="text-lg sm:text-xl font-semibold">站点列表</h2>
                        <button @click="addSite" class="w-full sm:w-auto text-sm bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-100 font-medium transition">+ 添加新站点</button>
                    </div>

                    <div v-for="(site, sIdx) in sites" :key="sIdx" class="border border-slate-200 rounded-xl p-4 bg-slate-50/50 hover:border-indigo-200 transition mb-6">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm font-medium text-slate-700">站点名称</label>
                                <input v-model="site.name" type="text" class="w-full mt-1.5 border border-slate-300 rounded-lg p-2.5 text-sm outline-none" placeholder="例如: 主站">
                            </div>
                            <div>
                                <label class="text-sm font-medium text-slate-700">默认源站 (根路径/)</label>
                                <input v-model="site.origin" type="text" class="w-full mt-1.5 border border-slate-300 rounded-lg p-2.5 text-sm outline-none" placeholder="例如: http://1.2.3.4:80">
                            </div>
                            <div class="col-span-1 sm:col-span-2">
                                <label class="text-sm font-medium text-slate-700">绑定域名 (空格分隔)</label>
                                <input :value="site.domains.join(' ')" @input="e => site.domains = e.target.value.split(' ')" type="text" class="w-full mt-1.5 border border-slate-300 rounded-lg p-2.5 text-sm outline-none" placeholder="example.com www.example.com">
                            </div>
                            <div>
                                <label class="text-sm font-medium text-slate-700">绑定 SSL 证书</label>
                                <select v-model="site.sslCertName" class="w-full mt-1.5 border border-slate-300 rounded-lg p-2.5 text-sm outline-none bg-white">
                                    <option value="">请选择证书</option>
                                    <option v-for="ssl in sslList" :key="ssl" :value="ssl">{{ ssl }}</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-sm font-medium text-slate-700">缓存后缀</label>
                                <input v-model="site.cacheExts" type="text" class="w-full mt-1.5 border border-slate-300 rounded-lg p-2.5 text-sm outline-none" placeholder="css|jpg|png|js">
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-t border-slate-200">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-sm text-slate-700">分路径回源</label>
                                <button @click="addLocation(site)" class="text-xs bg-indigo-50 text-slate-700 px-3 py-1.5 rounded-md transition">+ 添加规则</button>
                            </div>
                            <div v-for="(loc, lIdx) in site.locations" :key="lIdx" class="bg-white p-3 rounded-lg border border-slate-200 mb-2 space-y-2">
                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                    <input v-model="loc.path" type="text" class="border border-slate-300 rounded-md p-2 text-xs" placeholder="路径 (如: /api/)">
                                    <input v-model="loc.origin" type="text" class="border border-slate-300 rounded-md p-2 text-xs" placeholder="回源地址 (带协议)">
                                    <div class="flex gap-2">
                                        <input v-model="loc.host" type="text" class="border border-slate-300 rounded-md p-2 text-xs flex-1" placeholder="Host头 (选填)">
                                        <button @click="site.locations.splice(lIdx, 1)" class="text-rose-500 hover:text-rose-700 p-1">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-5 pt-4 border-t border-slate-200">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-sm font-medium text-slate-700">域名重定向 (301)</label>
                                <button @click="addRedirect(site)" class="text-xs bg-slate-200 text-slate-700 px-3 py-1.5 rounded-md">+ 添加</button>
                            </div>
                            <div v-for="(red, rIdx) in site.redirects" :key="rIdx" class="flex flex-col sm:flex-row gap-2 mt-2">
                                <input v-model="red.from" type="text" class="border border-slate-300 rounded-lg p-2 text-sm w-full sm:w-1/2" placeholder="来源域名">
                                <div class="flex gap-2 w-full sm:w-1/2">
                                    <input v-model="red.to" type="text" class="border border-slate-300 rounded-lg p-2 text-sm flex-1" placeholder="跳转至">
                                    <button @click="site.redirects.splice(rIdx, 1)" class="bg-rose-50 text-rose-600 px-3 py-2 rounded-lg text-sm transition">删除</button>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 flex justify-end">
                            <button @click="sites.splice(sIdx, 1)" class="text-sm text-red-500 bg-red-50 px-4 py-2 rounded-lg transition">删除站点</button>
                        </div>
                    </div>
                    <button @click="saveNginx" class="w-full bg-slate-800 text-white p-4 rounded-xl mt-4 font-medium">更新nginx.conf文件</button>
                </div>

                <div v-if="currentTab === 'ssl'" class="space-y-6">
                    <h2 class="text-lg sm:text-xl font-semibold">SSL 证书管理</h2>
                    <div class="bg-slate-50 border border-slate-200 p-5 rounded-xl">
                        <div class="grid grid-cols-1 gap-4 mb-4">
                            <input v-model="newSsl.name" type="text" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm" placeholder="证书名称">
                            <textarea v-model="newSsl.pem" class="w-full border border-slate-300 rounded-lg p-3 text-xs font-mono h-28" placeholder="PEM 内容"></textarea>
                            <textarea v-model="newSsl.key" class="w-full border border-slate-300 rounded-lg p-3 text-xs font-mono h-28" placeholder="KEY 内容"></textarea>
                        </div>
                        <button @click="saveSsl" class="w-full bg-slate-800 text-white p-3 rounded-xl">保存证书</button>
                    </div>
                    <div class="space-y-2">
                        <div v-for="ssl in sslList" :key="ssl" class="flex justify-between items-center p-3.5 bg-white rounded-lg border border-slate-200">
                            <span class="text-sm font-medium truncate">{{ ssl }}</span>
                            <div class="flex gap-2">
                                <button @click="editSsl(ssl)" class="text-indigo-600 text-sm bg-indigo-50 px-3 py-1.5 rounded-md">编辑</button>
                                <button @click="deleteSsl(ssl)" class="text-rose-600 text-sm bg-rose-50 px-3 py-1.5 rounded-md">删除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-if="currentTab === 'logs'" class="space-y-4">
                    <h2 class="text-lg sm:text-xl font-semibold">访问日志</h2>
                    <select v-model="selectedLogFile" @change="loadLogContent" class="w-full sm:w-1/2 border border-slate-300 rounded-lg p-2.5 text-sm bg-white">
                        <option value="">选择日志文件</option>
                        <option v-for="file in logFiles" :key="file" :value="file">{{ file }}</option>
                    </select>
                    <div class="bg-slate-900 text-emerald-400 p-4 rounded-xl font-mono text-xs h-[500px] overflow-auto">
                        <pre v-if="logContent">{{ logContent }}</pre>
                        <div v-else class="text-slate-500 text-center mt-20">等待选择日志...</div>
                    </div>
                </div>

                <div v-if="currentTab === 'nodes'" class="space-y-6">
                    <h2 class="text-lg sm:text-xl font-bold">节点管理</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 h-fit">
                            <h3 class="font-bold mb-4">{{ editingNodeIndex > -1 ? '编辑' : '新增' }}</h3>
                            <div class="space-y-3 text-sm">
                                <input v-model="editingNode.name" type="text" placeholder="节点名" class="w-full border rounded-lg px-3 py-2">
                                <input v-model="editingNode.ip" type="text" placeholder="IP" class="w-full border rounded-lg px-3 py-2">
                                <input v-model="editingNode.port" type="text" placeholder="SSH端口" class="w-full border rounded-lg px-3 py-2">
                                <input v-model="editingNode.username" type="text" placeholder="SSH用户" class="w-full border rounded-lg px-3 py-2">
                                <input v-model="editingNode.password" type="password" placeholder="SSH密码" class="w-full border rounded-lg px-3 py-2">
                                <button @click="saveNodeForm" class="w-full bg-indigo-600 text-white py-2 rounded-lg mt-2">保存</button>
                            </div>
                        </div>
                        <div class="lg:col-span-2 space-y-3">
                            <div v-for="(node, index) in nodes" :key="index" class="p-4 bg-white border border-slate-200 rounded-xl flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div><div class="font-bold">{{ node.name }}</div><div class="text-xs font-mono text-slate-500">{{ node.username }}@{{ node.ip }}:{{ node.port }}</div></div>
                                <div class="flex gap-2">
                                    <button @click="editNode(index)" class="text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg text-sm">编辑</button>
                                    <button @click="deleteNode(index)" class="text-rose-600 bg-rose-50 px-4 py-2 rounded-lg text-sm">删除</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-if="currentTab === 'console'" class="space-y-4">
                    <h2 class="text-lg sm:text-xl font-semibold">终端输出</h2>
                    <div ref="terminalBox" class="bg-slate-900 text-slate-100 p-4 rounded-xl font-mono text-xs h-[500px] overflow-auto">
                        <pre v-if="terminalOutput">{{ terminalOutput }}</pre>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, watch, nextTick } = Vue;
    const API_BASE = 'http://114514.114514.114514.114514:3000/api'; 

    createApp({
        setup() {
            const isLoggedIn = ref(false);
            const loggingIn = ref(false);
            const loginForm = ref({ username: '', password: '' });
            const currentTab = ref('nginx');
            const sites = ref([]);
            const sslList = ref([]);
            const logFiles = ref([]);
            const selectedLogFile = ref('');
            const logContent = ref('');
            const terminalOutput = ref('');
            const newSsl = ref({ name: '', pem: '', key: '' });
            const nodes = ref([]);
            const editingNode = ref({ name: '', ip: '', port: '22', username: 'root', password: '' });
            const editingNodeIndex = ref(-1);
            const terminalBox = ref(null);

            const getHeaders = () => ({
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('cdn_token') || ''}`
            });

            const handleLogin = async () => {
                loggingIn.value = true;
                try {
                    const res = await fetch(`${API_BASE}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(loginForm.value)
                    });
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('cdn_token', data.token);
                        isLoggedIn.value = true;
                        initData();
                    } else alert(data.message);
                } catch (e) { alert("连接失败"); }
                finally { loggingIn.value = false; }
            };

            const handleLogout = () => { localStorage.removeItem('cdn_token'); window.location.reload(); };

            const loadNginx = async () => {
                try {
                    const res = await fetch(`${API_BASE}/nginx`, { headers: getHeaders() });
                    if (res.status === 401) return handleLogout();
                    const data = await res.json();
                    sites.value = data.sites.map(s => ({
                        ...s,
                        locations: s.locations || [], // 确保 locations 存在
                        redirects: s.redirects || [],
                        cacheExts: s.cacheExts || 'css|jpeg|jpg|gif|png|webp|woff|eot|ttf|svg|ico'
                    }));
                } catch (e) { console.error(e); }
            };

            const saveNginx = async () => {
                try {
                    const res = await fetch(`${API_BASE}/nginx`, {
                        method: 'POST',
                        headers: getHeaders(),
                        body: JSON.stringify({ sites: sites.value })
                    });
                    const data = await res.json();
                    alert(data.message);
                } catch (e) { alert("保存失败"); }
            };

            const addSite = () => sites.value.unshift({ name: '', origin: '', domains: [], sslCertName: '', redirects: [], locations: [], cacheExts: 'css|jpeg|jpg|gif|png|webp|woff|eot|ttf|svg|ico' });
            const addRedirect = (site) => site.redirects.push({ from: '', to: '' });
            const addLocation = (site) => site.locations.push({ path: '', origin: '', host: '' });

            const loadSsl = async () => { const res = await fetch(`${API_BASE}/ssl`, { headers: getHeaders() }); const data = await res.json(); sslList.value = data.ssls; };
            const saveSsl = async () => {
                const res = await fetch(`${API_BASE}/ssl`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(newSsl.value) });
                const data = await res.json(); alert(data.message); if(data.success) { newSsl.value = { name:'', pem:'', key:'' }; loadSsl(); }
            };
            const deleteSsl = async (name) => { if(confirm('删除?')) { await fetch(`${API_BASE}/ssl/${name}`, { method: 'DELETE', headers: getHeaders() }); loadSsl(); } };
            const editSsl = async (name) => { const res = await fetch(`${API_BASE}/ssl/${name}`, { headers: getHeaders() }); const data = await res.json(); if(data.success) newSsl.value = { name: data.name, pem: data.pem, key: data.key }; };

            const loadNodes = async () => { const res = await fetch(`${API_BASE}/nodes`, { headers: getHeaders() }); const data = await res.json(); nodes.value = data.nodes; };
            const saveNodesToBackend = async () => { await fetch(`${API_BASE}/nodes`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ nodes: nodes.value }) }); loadNodes(); };
            const saveNodeForm = () => {
                if (editingNodeIndex.value > -1) nodes.value[editingNodeIndex.value] = { ...editingNode.value };
                else nodes.value.push({ ...editingNode.value });
                saveNodesToBackend(); editingNodeIndex.value = -1; editingNode.value = { name: '', ip: '', port: '22', username: 'root', password: '' };
            };
            const editNode = (index) => { editingNode.value = { ...nodes.value[index] }; editingNodeIndex.value = index; };
            const deleteNode = (index) => { if(confirm('删除?')) { nodes.value.splice(index, 1); saveNodesToBackend(); } };

            const triggerCmd = async (url) => {
                currentTab.value = 'console'; terminalOutput.value = `执行中...\n`;
                const res = await fetch(`${API_BASE}${url}`, { method: 'POST', headers: getHeaders() });
                const data = await res.json(); terminalOutput.value = data.output;
            };

            const loadLogs = async () => { const res = await fetch(`${API_BASE}/logs`, { headers: getHeaders() }); const data = await res.json(); logFiles.value = data.files; };
            const loadLogContent = async () => { const res = await fetch(`${API_BASE}/logs/${selectedLogFile.value}`, { headers: getHeaders() }); const data = await res.json(); logContent.value = data.content; };

            const initData = () => { loadNginx(); loadSsl(); loadLogs(); loadNodes(); };
            onMounted(() => { if (localStorage.getItem('cdn_token')) { isLoggedIn.value = true; initData(); } });
            watch(terminalOutput, () => nextTick(() => { if (terminalBox.value) terminalBox.value.scrollTop = terminalBox.value.scrollHeight; }));

            return {
                isLoggedIn, loggingIn, loginForm, handleLogin, handleLogout,
                currentTab, sites, sslList, logFiles, selectedLogFile, logContent, terminalOutput, newSsl, terminalBox,
                addSite, addRedirect, addLocation, saveNginx, saveSsl, triggerCmd, loadLogContent, editSsl, deleteSsl, 
                nodes, editingNode, editingNodeIndex, saveNodeForm, editNode, deleteNode,
                tabClass: (isActive) => `flex-shrink-0 md:w-full text-center md:text-left px-4 py-2.5 rounded-lg text-sm font-medium transition ${isActive ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600 hover:bg-slate-100'}`
            };
        }
    }).mount('#app');
</script>
</body>
</html>
